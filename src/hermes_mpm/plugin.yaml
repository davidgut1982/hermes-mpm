name: hermes_mpm
version: 1.0.0
kind: standalone
description: >-
  Multi-agent profile management (MPM) for Hermes. Tiered model routing (a
  pure-Python deterministic classifier pins the cheapest capable model per
  request), a parallel orchestrator (one batched delegate_task fans subtasks out
  across the native ThreadPoolExecutor), and deterministic intent fast-paths
  (weather / time / disk / service-status answered in-process, no LLM). Ships the
  default set of 22 agent profiles and a `hermes mpm` CLI (list-profiles +
  routing dry-run). Each capability registers in its own try/except so an unknown
  hook on an older core never blocks plugin load.
author: hermes-mpm
entry_point: register
config_namespace: hermes_mpm
provides_cli_commands:
  - mpm
provides_tools:
  - hermes_mpm_orchestrate
provides_commands:
  - weather
  - time
  - diskfree
  - svcstatus
provides_hooks:
  - pre_gateway_dispatch
provides_skills:
  - pm_orchestrator
